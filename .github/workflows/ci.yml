name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm before setup-node so the node cache can key on pnpm. Version comes from the
      # root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint + format
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests + coverage gates
        run: pnpm test

      # SCA: fail on known high/critical advisories in production dependencies.
      - name: Dependency audit
        run: pnpm audit --prod --audit-level high
