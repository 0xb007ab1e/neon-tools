name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # pnpm before setup-node so the node cache can key on pnpm. Version comes from the
      # root package.json "packageManager" field.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint + format
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      # Release gate: every per-tool version site (package.json/manifest/meta/openapi/README/badge)
      # must agree. Runs in any package that defines the script (currently tenantforge).
      - name: Version consistency
        run: pnpm -r --if-present version:check
      - name: Unit tests + coverage gates
        run: pnpm test
      # SCA: fail on known high/critical advisories in production dependencies.
      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Supply-chain gate (std-supplychain / workflow-cicd): generate an SBOM and scan the dependency
  # tree + repo config for vulnerabilities and misconfigurations. Blocks on fixable HIGH/CRITICAL.
  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # CycloneDX SBOM of the repo (source + dependencies); kept as a build artifact for CVE impact.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom-cyclonedx.json
      # Vulnerability + misconfiguration scan of the filesystem (lockfile deps + any IaC/Dockerfile).
      # ignore-unfixed: don't block on CVEs with no available fix (e.g. base-image noise).
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
