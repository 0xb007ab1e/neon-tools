name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # pnpm before setup-node so the node cache can key on pnpm. Version comes from the
      # root package.json "packageManager" field.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint + format
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Unit tests + coverage gates
        run: pnpm test
      # SCA: fail on known high/critical advisories in production dependencies.
      - name: Dependency audit
        run: pnpm audit --prod --audit-level high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
