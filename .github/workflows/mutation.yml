name: Mutation (tenantforge)

# Mutation testing on the critical pure-core modules (master §4: validate test *quality*, not just
# coverage, on critical paths — money + authorization logic). Scoped + path-filtered so it runs only
# when that core or its tests change; a weekly run catches drift, and it can be triggered by hand.
on:
  pull_request:
    branches: [main]
    paths:
      - 'tenantforge/src/core/**'
      - 'tenantforge/test/core/**'
      - 'tenantforge/stryker.config.mjs'
      - '.github/workflows/mutation.yml'
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC — surface regressions in unchanged code
  workflow_dispatch:

# Least privilege: only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fails the build when the mutation score drops below the `break` threshold in
      # stryker.config.mjs — i.e. when a change weakens the critical-path tests.
      - name: Stryker mutation testing (critical core)
        working-directory: tenantforge
        run: pnpm mutation
