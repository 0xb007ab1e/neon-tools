name: Release (tenantforge)

# Tag-triggered release integrity (std-supplychain / workflow-release): build the package once,
# generate a CycloneDX SBOM, attest non-falsifiable SLSA build provenance over the artifact (keyless
# via OIDC — no stored signing keys), and publish a GitHub Release with the tarball + SBOM attached.
on:
  push:
    tags:
      - 'tenantforge-v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload assets
      id-token: write # OIDC for keyless provenance attestation
      attestations: write # record the build-provenance attestation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build once, then pack the exact artifact that ships (dist + dashboard/dist + migrations).
      - name: Build
        run: pnpm --filter @neon-tools/tenantforge build
      - name: Pack tarball
        working-directory: tenantforge
        run: |
          pnpm pack --pack-destination "$RUNNER_TEMP"
          echo "TARBALL=$(ls "$RUNNER_TEMP"/*.tgz)" >> "$GITHUB_ENV"

      # CycloneDX SBOM of the built package (source + production dependencies).
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: tenantforge
          format: cyclonedx-json
          output-file: ${{ runner.temp }}/tenantforge.sbom.cdx.json
          upload-artifact: false

      # Non-falsifiable SLSA build provenance over the shipped tarball (verify with `gh attestation`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ env.TARBALL }}

      - name: Publish GitHub Release (tarball + SBOM)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SBOM: ${{ runner.temp }}/tenantforge.sbom.cdx.json
        run: |
          NOTES="Signed SLSA build provenance attested; CycloneDX SBOM attached. Verify with: gh attestation verify <tarball> --repo ${{ github.repository }}"
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "$NOTES" "$TARBALL" "$SBOM" \
            || gh release upload "$GITHUB_REF_NAME" "$TARBALL" "$SBOM" --clobber
