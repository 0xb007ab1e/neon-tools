# Each tool in the Neon collection lives in its own top-level directory and is a
# standalone package. The workspace provides shared orchestration + a single lockfile;
# directories without a package.json (e.g. research/) are ignored.
packages:
  - '*'
allowBuilds:
  esbuild: true
# Security overrides (Dependabot remediation): force the dev test toolchain to patched
# versions workspace-wide so every package (and transitive dep) resolves to a fixed release.
# - vitest >=3.2.6   GHSA-5xrq-8626-4rwp (critical)
# - vite   >=6.4.3   GHSA-fx2h-pf6j-xcff / GHSA-4w7w-66w2-5vf9 / GHSA-v6wh-96g9-6wx3
# - esbuild >=0.28.1 GHSA-gv7w-rqvm-qjhr / GHSA-67mh-4wv8-2f99
overrides:
  vitest: '>=3.2.6'
  '@vitest/coverage-v8': '>=3.2.6'
  vite: '>=6.4.3'
  esbuild: '>=0.28.1'
