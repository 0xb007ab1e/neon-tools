    expired_at: 2026-07-22
  - id: CVE-2026-28390
    statement: >-
      not_affected (vulnerable_code_not_in_execute_path): CMS NULL-deref DoS; app never
      processes CMS. VEX: security/vex/openssl-base-2026-06.openvex.json
