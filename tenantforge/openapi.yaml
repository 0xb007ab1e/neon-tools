openapi: 3.1.0
info:
  title: TenantForge HTTP Control-Plane API
  version: 0.3.0
  description: >
    Control plane for database-per-tenant SaaS on Neon: provision an isolated project per tenant,
    look tenants up, and run lifecycle operations (suspend / resume / offboard). Long-running fleet
    migrations are intentionally not exposed over HTTP — use the CLI (`tenantforge migrate-fleet`).
    Every `/v1/*` route requires a bearer token; tenant scope is derived server-side from the
    authenticated principal (a client-supplied id is never trusted — std-owasp-api BOLA).
    Tokens are per-operator with a role: `readonly` may read (GET), `admin` may mutate — a `readonly`
    principal calling a mutating route gets 403. Every `/v1/*` route is rate-limited per principal
    (429 with `Retry-After` when exceeded).
servers:
  - url: '{baseUrl}'
    variables:
      baseUrl:
        default: http://localhost:3000
        description: Set via TENANTFORGE_BASE_URL.
security:
  - bearerAuth: []
tags:
  - name: tenants
    description: Tenant provisioning, lookup, and lifecycle.
  - name: meta
    description: Service metadata.
paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness probe.
      security: []
      responses:
        '200':
          description: The service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ok }
                  tool: { type: string }
                  version: { type: string }
                required: [status, tool, version]
  /ready:
    get:
      tags: [meta]
      summary: Readiness probe — checks critical dependencies (registry connectivity).
      description: >
        200 when every dependency check passes; 503 when degraded so an orchestrator stops routing
        traffic to this instance. Distinct from the static liveness probe at /health.
      security: []
      responses:
        '200':
          description: All dependencies healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }
        '503':
          description: A dependency is degraded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }
  /v1/tenants:
    post:
      tags: [tenants]
      summary: Provision a tenant (isolated Neon project). Idempotent on slug.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProvisionRequest' }
      responses:
        '201':
          description: Provisioned (or idempotent re-request).
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
                  connectionUri:
                    type: [string, 'null']
                    description: >
                      Owner connection URI — a SECRET, returned once to the authenticated caller on
                      first creation (null on an idempotent re-request). Store it in a secret
                      manager; never log it.
                required: [tenant, connectionUri]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
    get:
      tags: [tenants]
      summary: List tenants, most-recent first.
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/TenantStatus' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Matching tenants.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items: { $ref: '#/components/schemas/Tenant' }
                required: [tenants]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/tenants/{id}:
    get:
      tags: [tenants]
      summary: Get a tenant by id.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
      responses:
        '200':
          description: The tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
                required: [tenant]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/tenants/{id}/suspend:
    post:
      tags: [tenants]
      summary: Suspend an active tenant (reversible).
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200': { $ref: '#/components/responses/TenantEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/tenants/{id}/resume:
    post:
      tags: [tenants]
      summary: Resume a suspended tenant back to active.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200': { $ref: '#/components/responses/TenantEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/tenants/{id}/offboard:
    post:
      tags: [tenants]
      summary: >
        Offboard a tenant — archive it: retain the Neon project (scaled to zero), stop serving.
        REVERSIBLE via resume until purged; no confirmation needed.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: Archived (tenant is `offboarding`, pending purge).
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
                  archive:
                    oneOf:
                      - { $ref: '#/components/schemas/ExportResult' }
                      - { type: 'null' }
                required: [tenant, archive]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/tenants/{id}/purge:
    post:
      tags: [tenants]
      summary: >
        Purge an offboarded tenant — IRREVERSIBLY delete its Neon project and crypto-shred its
        connection secret. Requires `confirm: true`. The deferred hard-delete after retention.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PurgeRequest' }
      responses:
        '200': { $ref: '#/components/responses/TenantEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        A per-operator bearer token. Each token maps to a principal id (for attribution +
        per-principal rate limiting) and a role granting fine-grained permissions, enforced
        server-side per operation (deny by default): `admin` holds all permissions; `operator` may
        run the full reversible lifecycle (read / provision / suspend / offboard) but NOT the
        irreversible purge; `readonly` may only read. A token may also carry an explicit permission
        set that narrows its role. Lacking the required permission returns 403.
  parameters:
    TenantId:
      name: id
      in: path
      required: true
      description: The tenant id (UUID), derived server-side from the authenticated principal.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Optional client-chosen key (≤255 chars). A retry of the same POST with the same key replays
        the original response (header `Idempotency-Replayed: true`) instead of re-executing. Reusing a
        key with a different request body returns 422; a still-in-flight request returns 409. Keys are
        scoped per principal and expire after 24h.
      schema: { type: string, maxLength: 255 }
  schemas:
    TenantStatus:
      type: string
      enum: [provisioning, active, suspended, offboarding, deleted]
    HealthReport:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        checks:
          type: object
          properties:
            registry: { type: string, enum: [ok, error] }
          required: [registry]
      required: [status, checks]
    Tenant:
      type: object
      description: A control-plane tenant record (metadata only — never tenant content).
      properties:
        id: { type: string }
        slug: { type: string }
        region: { type: string }
        status: { $ref: '#/components/schemas/TenantStatus' }
        neonProjectId: { type: [string, 'null'] }
        metadata: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, slug, region, status, neonProjectId, metadata, createdAt, updatedAt]
    ProvisionRequest:
      type: object
      properties:
        slug:
          type: string
          description: 3–63 chars, lowercase alphanumerics in single-hyphen groups; not reserved.
        region:
          type: string
          description: Neon region id; defaults to the server's configured region when omitted.
        residency:
          type: string
          enum: [us, eu, apac]
          description: Required data-residency jurisdiction; the region must belong to it (else 409).
        metadata: { type: object, additionalProperties: true }
      required: [slug]
    PurgeRequest:
      type: object
      properties:
        confirm:
          type: boolean
          const: true
          description: Must be true — confirms the irreversible hard-delete (defense in depth).
      required: [confirm]
    ExportResult:
      type: object
      description: A reference to a tenant's retained archive.
      properties:
        location: { type: string, description: 'e.g. neon-project:<id> for the retained project.' }
        bytes: { type: integer }
      required: [location]
    Problem:
      type: object
      description: RFC 9457 problem detail.
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
      required: [title, status]
  responses:
    TenantEnvelope:
      description: The updated tenant.
      content:
        application/json:
          schema:
            type: object
            properties:
              tenant: { $ref: '#/components/schemas/Tenant' }
            required: [tenant]
    BadRequest:
      description: Invalid request (validation / bad input).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Authenticated but lacking the required role (e.g. a readonly principal mutating).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    TooManyRequests:
      description: Per-principal rate limit exceeded; see the `Retry-After` header.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UnprocessableEntity:
      description: Idempotency-Key reused with a different request body.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Tenant not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Illegal state transition or slug conflict.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
