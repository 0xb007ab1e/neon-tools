openapi: 3.1.0
info:
  title: TenantForge HTTP Control-Plane API
  version: 0.30.0
  description: >
    Control plane for database-per-tenant SaaS on Neon: provision an isolated project per tenant,
    look tenants up, run lifecycle operations (suspend / resume / offboard), and read the
    extension reports — compliance attestation, cost/margin, invoices, and the fleet reconcile plan
    + history. Long-running, SQL-bearing fleet operations (migrate / reconcile *execution*) are
    intentionally not exposed over HTTP — use the CLI (`tenantforge migrate-fleet` /
    `reconcile-fleet`) or the gated dashboard action; HTTP exposes only their read-only plan/history.
    Every `/v1/*` route requires a bearer token; tenant scope is derived server-side from the
    authenticated principal (a client-supplied id is never trusted — std-owasp-api BOLA).
    Tokens are per-operator with a role: `readonly` may read (GET), `admin` may mutate — a `readonly`
    principal calling a mutating route gets 403. Every `/v1/*` route is rate-limited per principal
    (429 with `Retry-After` when exceeded).
servers:
  - url: '{baseUrl}'
    variables:
      baseUrl:
        default: http://localhost:3000
        description: Set via TENANTFORGE_BASE_URL.
security:
  - bearerAuth: []
tags:
  - name: tenants
    description: Tenant provisioning, lookup, and lifecycle.
  - name: reports
    description: Read-only extension reports — compliance, cost/margin, invoices.
  - name: fleet
    description: Fleet schema-version drift reconciliation (read-only plan + history over HTTP).
  - name: billing
    description: Read-only charge history (charging is a CLI / gated operation, not HTTP).
  - name: meta
    description: Service metadata.
paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness probe.
      security: []
      responses:
        '200':
          description: The service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ok }
                  tool: { type: string }
                  version: { type: string }
                required: [status, tool, version]
  /ready:
    get:
      tags: [meta]
      summary: Readiness probe — checks critical dependencies (registry connectivity).
      description: >
        200 when every dependency check passes; 503 when degraded so an orchestrator stops routing
        traffic to this instance. Distinct from the static liveness probe at /health.
      security: []
      responses:
        '200':
          description: All dependencies healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }
        '503':
          description: A dependency is degraded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }
  /v1/tenants:
    post:
      tags: [tenants]
      summary: Provision a tenant (isolated Neon project). Idempotent on slug.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProvisionRequest' }
      responses:
        '201':
          description: Provisioned (or idempotent re-request).
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
                  connectionUri:
                    type: [string, 'null']
                    description: >
                      Owner connection URI — a SECRET, returned once to the authenticated caller on
                      first creation (null on an idempotent re-request). Store it in a secret
                      manager; never log it.
                required: [tenant, connectionUri]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
    get:
      tags: [tenants]
      summary: List tenants, most-recent first.
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/TenantStatus' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Matching tenants.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items: { $ref: '#/components/schemas/Tenant' }
                required: [tenants]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/tenants/{id}:
    get:
      tags: [tenants]
      summary: Get a tenant by id.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
      responses:
        '200':
          description: The tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
                required: [tenant]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/tenants/{id}/suspend:
    post:
      tags: [tenants]
      summary: Suspend an active tenant (reversible).
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200': { $ref: '#/components/responses/TenantEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/tenants/{id}/resume:
    post:
      tags: [tenants]
      summary: Resume a suspended tenant back to active.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200': { $ref: '#/components/responses/TenantEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/tenants/{id}/offboard:
    post:
      tags: [tenants]
      summary: >
        Offboard a tenant — archive it: retain the Neon project (scaled to zero), stop serving.
        REVERSIBLE via resume until purged; no confirmation needed.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: Archived (tenant is `offboarding`, pending purge).
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: '#/components/schemas/Tenant' }
                  archive:
                    oneOf:
                      - { $ref: '#/components/schemas/ExportResult' }
                      - { type: 'null' }
                required: [tenant, archive]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/tenants/{id}/purge:
    post:
      tags: [tenants]
      summary: >
        Purge an offboarded tenant — IRREVERSIBLY delete its Neon project and crypto-shred its
        connection secret. Requires `confirm: true`. The deferred hard-delete after retention.
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PurgeRequest' }
      responses:
        '200': { $ref: '#/components/responses/TenantEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
  /v1/compliance/report:
    get:
      tags: [reports]
      summary: >
        Compliance attestation (requires `tenant:read`): physical isolation (one dedicated Neon
        project per tenant) + data residency, plus an audit-backed erasure history when an audit
        store is wired, with a SHA-256 integrity digest. Evidence, not a legal certification.
      responses:
        '200':
          description: The compliance report + digest.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComplianceReportResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/cost/report:
    get:
      tags: [reports]
      summary: >
        Per-tenant cost vs. price (margin) over a period (requires `tenant:read`) — a read-only
        estimate from the configured cost rates vs. `metadata.priceUsd`, not an invoice.
      parameters:
        - { $ref: '#/components/parameters/PeriodFrom' }
        - { $ref: '#/components/parameters/PeriodTo' }
      responses:
        '200':
          description: The cost report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CostReport' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/cost/anomalies:
    get:
      tags: [reports]
      summary: >
        Cost/margin anomalies over a period (requires `tenant:read`) — unprofitable + unpriced
        tenants always, plus opt-in `min-margin` (thin-margin) / `max-cost` (high-cost) flags.
        Read-only FinOps detection, most-severe-first.
      parameters:
        - { $ref: '#/components/parameters/PeriodFrom' }
        - { $ref: '#/components/parameters/PeriodTo' }
        - name: min-margin
          in: query
          required: false
          description: Flag profitable tenants under this margin (USD) as `low-margin`.
          schema: { type: number }
        - name: max-cost
          in: query
          required: false
          description: Flag tenants at/above this cost (USD) as `high-cost`.
          schema: { type: number }
      responses:
        '200':
          description: The detected cost anomalies (empty when none).
          content:
            application/json:
              schema:
                type: object
                properties:
                  anomalies:
                    type: array
                    items: { type: object }
                required: [anomalies]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/invoices:
    get:
      tags: [reports]
      summary: >
        Generate invoice documents for every active tenant over a period (requires `tenant:read`),
        failure-isolated. Documents (line items + total) — not card charges.
      parameters:
        - { $ref: '#/components/parameters/PeriodFrom' }
        - { $ref: '#/components/parameters/PeriodTo' }
      responses:
        '200':
          description: The fleet invoice run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FleetInvoiceReport' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/signup-tokens:
    get:
      tags: [reports]
      summary: >
        List recent signup/invite tokens (requires `tenant:read`) — status only, never the token or
        its hash. Read-only; issuing/redeeming a token provisions resources and is a CLI/library op
        (never over HTTP/MCP). Empty unless a signup-token store is wired.
      responses:
        '200':
          description: Recent signup-token summaries (redacted).
          content:
            application/json:
              schema:
                type: object
                properties:
                  signupTokens:
                    type: array
                    items: { type: object }
                required: [signupTokens]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/plans:
    get:
      tags: [reports]
      summary: >
        The operator's plan catalog (requires `tenant:read`) — published tiers (id, name, price,
        included allowances). Read-only; assigning a plan to a tenant is a billing-policy CLI op.
      responses:
        '200':
          description: The plan catalog (empty when none configured).
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/usage-alerts:
    get:
      tags: [reports]
      summary: >
        Recent usage-alert history (requires `tenant:read`) — tenants that crossed a configured
        fraction of their plan's included allowance. Read-only; the live sweep that emits alerts
        and notifies tenants is a library/CLI op (not a side-effecting GET).
      responses:
        '200':
          description: Recent `tenant.usage_alert` events (empty without an audit store).
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/tenants/{id}/invoice:
    get:
      tags: [reports]
      summary: Generate an invoice document for one tenant over a period (requires `tenant:read`).
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - { $ref: '#/components/parameters/PeriodFrom' }
        - { $ref: '#/components/parameters/PeriodTo' }
      responses:
        '200':
          description: The invoice.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/fleet/reconcile:
    get:
      tags: [fleet]
      summary: >
        Preview a fleet reconcile plan (requires `tenant:read`, read-only) — which active tenants are
        behind the target and exactly which versions each would receive. No SQL needed; execution is a
        CLI / gated-dashboard operation, never HTTP.
      parameters:
        - name: target
          in: query
          required: false
          description: Reconcile up to this catalog version instead of the latest.
          schema: { type: string }
      responses:
        '200':
          description: The reconcile plan.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FleetReconcilePlan' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/fleet/reconcile/history:
    get:
      tags: [fleet]
      summary: >
        Recent fleet reconcile history (requires `tenant:read`) from the persisted audit trail —
        empty unless an audit store is wired (`TENANTFORGE_AUDIT_LOG=pg`).
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent reconcile events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [history]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/charges:
    get:
      tags: [billing]
      summary: >
        Recent charge history (requires `tenant:read`) from the persisted audit trail. Read-only —
        charging itself moves money and is a CLI / gated operation, never exposed over HTTP. Empty
        unless an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent charge events (no card data).
          content:
            application/json:
              schema:
                type: object
                properties:
                  charges:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [charges]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/webhook-events:
    get:
      tags: [billing]
      summary: >
        Recent inbound PSP webhook events (requires `tenant:read`) from the persisted audit trail.
        Empty unless an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent payment-webhook events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [events]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/tenants/{id}/plan/preview:
    get:
      tags: [tenants, billing]
      summary: >
        Preview a plan change (requires `tenant:read`): the prorated settlement (signed minor units)
        for switching this tenant to `?price` USD for the remaining period. Read-only quote — no
        mutation, no money. Applying a change (and settling) is a CLI / gated operation, not HTTP.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: price
          in: query
          required: true
          description: The proposed flat plan price in USD (>= 0).
          schema: { type: number, minimum: 0 }
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: The prorated plan-change quote.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId: { type: string }
                  oldPriceUsd: { type: number }
                  newPriceUsd: { type: number }
                  period:
                    type: object
                    properties: { from: { type: string }, to: { type: string } }
                  proratedDeltaMinor: { type: integer }
                required: [tenantId, oldPriceUsd, newPriceUsd, period, proratedDeltaMinor]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/tenants/{id}/credit:
    get:
      tags: [tenants, billing]
      summary: >
        A tenant's credit balance + recent ledger entries (requires `tenant:read`). Read-only —
        granting credit is a CLI / gated operation. Balance is `0` and entries `[]` unless a credit
        ledger is wired.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: currency
          in: query
          required: false
          description: Lowercase ISO 4217 currency (default usd).
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Max ledger entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: The tenant's balance + ledger entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId: { type: string }
                  currency: { type: string }
                  balanceMinor: { type: integer }
                  entries: { type: array, items: { type: object } }
                required: [tenantId, currency, balanceMinor, entries]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/plan-changes:
    get:
      tags: [billing]
      summary: >
        Recent plan-change history (requires `tenant:read`) from the persisted audit trail. Read-only
        — applying a change is a CLI operation (a mutation + optional money settlement). Empty unless
        an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent plan-change events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  planChanges:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [planChanges]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/audit/anomalies:
    get:
      tags: [reports]
      summary: >
        Scan the recent audit trail for anomalies (requires `tenant:read`) — an overall error spike
        plus per-actor / per-tenant error clusters (std-mitre-attack detection). Read-only.
        Empty unless an audit store is wired.
      parameters:
        - name: since
          in: query
          required: false
          description: Only examine events at/after this ISO-8601 instant.
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          required: false
          description: Recent-event window to scan (default 500, capped).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: The detected anomalies (empty when none cross a threshold).
          content:
            application/json:
              schema:
                type: object
                properties:
                  anomalies:
                    type: array
                    items: { type: object }
                required: [anomalies]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/retention:
    get:
      tags: [reports]
      summary: >
        Retention report (requires `tenant:read`) — which archived (offboarding) tenants are
        scheduled for purge and when, given the retention window. Read-only preview of what the
        purge sweep would eventually delete; eligibility matches the sweep exactly.
      parameters:
        - name: retention-days
          in: query
          required: false
          description: Override the retention window in days (default = configured).
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: The retention report (eligible / pending counts + per-tenant rows).
          content:
            application/json:
              schema: { type: object }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/exports:
    get:
      tags: [reports]
      summary: >
        Recent data-export history (requires `tenant:read`) — the GDPR portability / DSAR trail.
        Read-only; the export itself reads tenant data and is a CLI/library op (never over HTTP/MCP).
        Empty unless an audit store is wired.
      responses:
        '200':
          description: Recent `tenant.exported` events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  exports:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [exports]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/audit:
    get:
      tags: [reports]
      summary: >
        Query the control-plane audit trail (requires `tenant:read`) — the operator-attributed,
        append-only who-did-what-when event stream (NIST AU / SOC2 / OWASP A09), newest-first and
        bounded. Read-only; events are already redacted. Empty unless an audit store is wired.
      parameters:
        - name: event
          in: query
          required: false
          description: Event name to filter by; repeatable (`?event=a&event=b`). Omitted = any.
          schema: { type: array, items: { type: string } }
        - name: tenant
          in: query
          required: false
          description: Restrict to one tenant id.
          schema: { type: string }
        - name: since
          in: query
          required: false
          description: Only events at/after this ISO-8601 instant.
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          required: false
          description: Max rows, newest-first (default 50, capped).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Matching audit events, most-recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [events]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/invoices-sent:
    get:
      tags: [billing]
      summary: >
        Recent invoice-delivery history (requires `tenant:read`) from the persisted audit trail.
        Read-only — sending an invoice email is a CLI operation; the recipient address is never
        recorded (PII). Empty unless an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent invoice-delivery events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoicesSent:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [invoicesSent]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/notifications:
    get:
      tags: [billing]
      summary: >
        Recent billing-receipt notifications (requires `tenant:read`) from the persisted audit trail.
        Receipts are an automatic best-effort side-effect of charge/refund; the recipient address is
        never recorded. Read-only. Empty unless an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent notification events (no recipient address).
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [notifications]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/refunds:
    get:
      tags: [billing]
      summary: >
        Recent refund history (requires `tenant:read`) from the persisted audit trail. Read-only —
        issuing a refund returns real money, so it is a CLI / gated operation, never exposed over
        HTTP. Empty unless an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent refund events (no card data).
          content:
            application/json:
              schema:
                type: object
                properties:
                  refunds:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [refunds]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/runs:
    get:
      tags: [billing]
      summary: >
        Recent billing-run roll-up history (requires `tenant:read`) from the persisted audit trail.
        Read-only — the run itself charges the fleet and may suspend tenants, so it is a CLI / gated
        operation (for a cron), never exposed over HTTP. Empty unless an audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent billing-run events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [runs]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /v1/billing/dunning:
    get:
      tags: [billing]
      summary: >
        Recent dunning history (requires `tenant:read`) from the persisted audit trail — failed-charge
        retries, suspensions, and skips. Read-only — the dunning *run* itself moves money and may
        suspend tenants, so it is a CLI / gated operation, never exposed over HTTP. Empty unless an
        audit store is wired.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max entries, newest-first (default 20).
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Recent dunning events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                required: [events]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /webhooks/payment:
    post:
      tags: [billing]
      summary: >
        Inbound PSP webhook endpoint (e.g. Stripe). **Authenticated by the request signature, not the
        bearer token** — so it sits outside `/v1`. The signature is verified against the raw body and
        the timestamp is replay-checked; the (untrusted) payload is then parsed. Mounted only when a
        webhook verifier is configured. Respond fast; failures return 400 without detail.
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          description: The PSP signature header (scheme `t=…,v1=…`).
          schema: { type: string }
      requestBody:
        required: true
        description: The raw PSP event payload (verified by signature over the exact bytes).
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Accepted (signature verified).
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean, const: true }
                  type: { type: string }
                required: [received, type]
        '400': { $ref: '#/components/responses/BadRequest' }
        '413':
          description: Payload too large.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        A per-operator bearer token. Each token maps to a principal id (for attribution +
        per-principal rate limiting) and a role granting fine-grained permissions, enforced
        server-side per operation (deny by default): `admin` holds all permissions; `operator` may
        run the full reversible lifecycle (read / provision / suspend / offboard) but NOT the
        irreversible purge; `readonly` may only read. A token may also carry an explicit permission
        set that narrows its role. Lacking the required permission returns 403.
  parameters:
    TenantId:
      name: id
      in: path
      required: true
      description: The tenant id (UUID), derived server-side from the authenticated principal.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Optional client-chosen key (≤255 chars). A retry of the same POST with the same key replays
        the original response (header `Idempotency-Replayed: true`) instead of re-executing. Reusing a
        key with a different request body returns 422; a still-in-flight request returns 409. Keys are
        scoped per principal and expire after 24h.
      schema: { type: string, maxLength: 255 }
    PeriodFrom:
      name: from
      in: query
      required: false
      description: Period start (ISO-8601). Defaults to the start of the current calendar month.
      schema: { type: string, format: date-time }
    PeriodTo:
      name: to
      in: query
      required: false
      description: Period end (ISO-8601). Defaults to now.
      schema: { type: string, format: date-time }
  schemas:
    TenantStatus:
      type: string
      enum: [provisioning, active, suspended, offboarding, deleted]
    HealthReport:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        checks:
          type: object
          properties:
            registry: { type: string, enum: [ok, error] }
          required: [registry]
      required: [status, checks]
    Tenant:
      type: object
      description: A control-plane tenant record (metadata only — never tenant content).
      properties:
        id: { type: string }
        slug: { type: string }
        region: { type: string }
        status: { $ref: '#/components/schemas/TenantStatus' }
        neonProjectId: { type: [string, 'null'] }
        metadata: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, slug, region, status, neonProjectId, metadata, createdAt, updatedAt]
    ProvisionRequest:
      type: object
      properties:
        slug:
          type: string
          description: 3–63 chars, lowercase alphanumerics in single-hyphen groups; not reserved.
        region:
          type: string
          description: Neon region id; defaults to the server's configured region when omitted.
        residency:
          type: string
          enum: [us, eu, apac]
          description: Required data-residency jurisdiction; the region must belong to it (else 409).
        metadata: { type: object, additionalProperties: true }
      required: [slug]
    PurgeRequest:
      type: object
      properties:
        confirm:
          type: boolean
          const: true
          description: Must be true — confirms the irreversible hard-delete (defense in depth).
      required: [confirm]
    ExportResult:
      type: object
      description: A reference to a tenant's retained archive.
      properties:
        location: { type: string, description: 'e.g. neon-project:<id> for the retained project.' }
        bytes: { type: integer }
      required: [location]
    ComplianceReportResult:
      type: object
      properties:
        report: { $ref: '#/components/schemas/ComplianceReport' }
        digest:
          type: string
          description: SHA-256 hex digest over the canonical report JSON (integrity anchor).
      required: [report, digest]
    ComplianceAuditEntry:
      type: object
      properties:
        at: { type: string, format: date-time }
        event: { type: string }
        outcome: { type: string, enum: [ok, error] }
        actor:
          type: object
          properties:
            id: { type: string }
            role: { type: string }
          required: [id, role]
        tenantId: { type: string }
      required: [at, event, outcome]
    ComplianceReport:
      type: object
      description: Point-in-time isolation + residency attestation derived from the registry.
      properties:
        generatedAt: { type: string, format: date-time }
        inventory:
          type: object
          properties:
            total: { type: integer }
            byStatus: { type: object, additionalProperties: { type: integer } }
          required: [total, byStatus]
        isolation:
          type: object
          properties:
            compliant: { type: boolean }
            missingProject: { type: array, items: { type: string } }
            sharedProjects:
              type: array
              items:
                type: object
                properties:
                  neonProjectId: { type: string }
                  tenantIds: { type: array, items: { type: string } }
                required: [neonProjectId, tenantIds]
          required: [compliant, missingProject, sharedProjects]
        residency:
          type: object
          properties:
            compliant: { type: boolean }
            allowedRegions: { type: array, items: { type: string } }
            byJurisdiction: { type: object, additionalProperties: { type: integer } }
            violations:
              type: array
              items:
                type: object
                properties:
                  tenantId: { type: string }
                  region: { type: string }
                  reason: { type: string }
                required: [tenantId, region, reason]
          required: [compliant, allowedRegions, byJurisdiction, violations]
        audit:
          type: object
          description: Present only when a persisted audit store is wired.
          properties:
            erasures: { type: array, items: { $ref: '#/components/schemas/ComplianceAuditEntry' } }
            recent: { type: array, items: { $ref: '#/components/schemas/ComplianceAuditEntry' } }
          required: [erasures, recent]
      required: [generatedAt, inventory, isolation, residency]
    CostReport:
      type: object
      description: Per-tenant cost vs. price estimate (USD). Not an invoice.
      properties:
        generatedAt: { type: string, format: date-time }
        rows:
          type: array
          items:
            type: object
            properties:
              tenantId: { type: string }
              costUsd: { type: number }
              priceUsd: { type: [number, 'null'] }
              marginUsd: { type: [number, 'null'] }
              unprofitable: { type: boolean }
            required: [tenantId, costUsd, priceUsd, marginUsd, unprofitable]
        unmetered:
          type: array
          items: { type: string }
          description: Tenants whose consumption could not be metered (excluded from totals).
        totals:
          type: object
          properties:
            tenants: { type: integer }
            costUsd: { type: number }
            priceUsd: { type: number }
            marginUsd: { type: number }
            unprofitable: { type: integer }
            unpriced: { type: integer }
          required: [tenants, costUsd, priceUsd, marginUsd, unprofitable, unpriced]
      required: [generatedAt, rows, unmetered, totals]
    InvoiceLineItem:
      type: object
      properties:
        description: { type: string }
        quantity: { type: number }
        unit: { type: string }
        unitPriceUsd: { type: number }
        amountUsd: { type: number, description: 'quantity * unitPriceUsd, rounded to cents.' }
      required: [description, quantity, unit, unitPriceUsd, amountUsd]
    Invoice:
      type: object
      description: A generated invoice document for one tenant + period (an artifact, not a charge).
      properties:
        tenantId: { type: string }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        currency: { type: string, description: ISO 4217 code (USD for now). }
        generatedAt: { type: string, format: date-time }
        lineItems: { type: array, items: { $ref: '#/components/schemas/InvoiceLineItem' } }
        totalUsd: { type: number, description: Sum of line amounts (USD, rounded to cents). }
      required: [tenantId, periodStart, periodEnd, currency, generatedAt, lineItems, totalUsd]
    FleetInvoiceReport:
      type: object
      properties:
        generatedAt: { type: string, format: date-time }
        invoices: { type: array, items: { $ref: '#/components/schemas/Invoice' } }
        unmetered:
          type: array
          items: { type: string }
          description: Active tenants that could not be metered (no invoice produced).
      required: [generatedAt, invoices, unmetered]
    FleetReconcilePlan:
      type: object
      description: A read-only plan to bring behind/failed tenants up to a target catalog version.
      properties:
        target:
          { type: [string, 'null'], description: Target version (null when the catalog is empty). }
        perTenant:
          type: array
          items:
            type: object
            properties:
              tenantId: { type: string }
              missing:
                type: array
                items: { type: string }
                description: Versions to apply, in catalog order.
            required: [tenantId, missing]
        pendingTenants: { type: array, items: { type: string } }
        upToDate: { type: array, items: { type: string } }
        totalMissing: { type: integer }
        batches:
          type: array
          items: { type: array, items: { type: string } }
          description: Pending tenants split into bounded fan-out batches.
      required: [target, perTenant, pendingTenants, upToDate, totalMissing, batches]
    AuditEvent:
      type: object
      description: A persisted, redacted control-plane audit event (no secrets/PII).
      properties:
        event: { type: string }
        at: { type: string, format: date-time }
        outcome: { type: string, enum: [ok, error] }
        actor:
          type: object
          properties:
            id: { type: string }
            role: { type: string }
          required: [id, role]
        tenantId: { type: string }
        durationMs: { type: integer }
        context: { type: object, additionalProperties: true }
        error: { type: string }
      required: [event, at, outcome]
    Problem:
      type: object
      description: RFC 9457 problem detail.
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
      required: [title, status]
  responses:
    TenantEnvelope:
      description: The updated tenant.
      content:
        application/json:
          schema:
            type: object
            properties:
              tenant: { $ref: '#/components/schemas/Tenant' }
            required: [tenant]
    BadRequest:
      description: Invalid request (validation / bad input).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Authenticated but lacking the required role (e.g. a readonly principal mutating).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    TooManyRequests:
      description: Per-principal rate limit exceeded; see the `Retry-After` header.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UnprocessableEntity:
      description: Idempotency-Key reused with a different request body.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Tenant not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Illegal state transition or slug conflict.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
